<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raise a Complaint | Civic Portal</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="text-gray-800 bg-gray-50">

<!-- Header -->
<header class="flex items-center justify-between px-4 md:px-6 py-4 bg-white shadow-sm sticky top-0 z-50">
    <div class="flex items-center space-x-2">
        <div class="bg-blue-600 text-white p-2 rounded">
            <i class="fas fa-university"></i>
        </div>
        <span class="font-bold text-lg md:text-xl tracking-tight text-blue-900 uppercase">
            Civic Portal
        </span>
    </div>

    <a href="index.html" class="text-blue-600 font-semibold hover:underline">
        ← Back to Home
    </a>
</header>

<!-- Page Title -->
<section class="hero-gradient py-12 px-4 text-center">
    <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-2">
        Raise a Complaint
    </h1>
    <p class="text-gray-500 max-w-xl mx-auto">
        Report civic issues in your area and help authorities take quick action.
    </p>
</section>

<!-- Complaint Form -->
<section class="py-16 px-4 md:px-6">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg p-8 md:p-10">

        <form class="space-y-6">

            <!-- Full Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Full Name
                </label>
                <input type="text" required
                    class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Email Address
                </label>
                <input type="email" required
                    class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Issue Category -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Issue Category
                </label>
                <select required
                    class="w-full px-4 py-3 border rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Select a category</option>
                    <option>Roads & Potholes</option>
                    <option>Water Supply</option>
                    <option>Street Lighting</option>
                    <option>Waste Management</option>
                    <option>Public Health</option>
                    <option>Electricity</option>
                </select>
            </div>

            <!-- Location -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Location / Area
                </label>
                <input type="text" placeholder="Street, Area, City"
                    class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Description -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Issue Description
                </label>
                <textarea rows="4" required
                    class="w-full px-4 py-3 border rounded-xl resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Describe the issue in detail..."></textarea>
            </div>

            <!-- Upload Photo -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Upload Photo (optional)
                </label>
                <input type="file"
                    class="w-full text-sm text-gray-500
                           file:mr-4 file:py-2 file:px-4
                           file:rounded-lg file:border-0
                           file:bg-blue-600 file:text-white
                           hover:file:bg-blue-700">
            </div>

            <!-- Buttons -->
            <div class="flex flex-col md:flex-row gap-4 pt-4">
                <button type="submit"
                    class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 w-full md:w-auto">
                    Submit Complaint
                </button>

                <button type="reset"
                    class="border border-gray-300 text-gray-700 px-6 py-3 rounded-xl font-semibold hover:bg-gray-100 w-full md:w-auto">
                    Reset Form
                </button>
            </div>

        </form>
    </div>
</section>
</body>
</html>
