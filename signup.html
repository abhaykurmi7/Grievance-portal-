<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Civic Portal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="hero-gradient min-h-screen flex items-center justify-center px-4">

<div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-8">
    <div class="text-center mb-8">
        <div class="bg-blue-600 text-white w-14 h-14 rounded-xl flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-user-plus text-xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Create Account</h1>
        <p class="text-gray-500 text-sm mt-1">Join Civic Portal today</p>
    </div>

<form class="space-y-5">

    <!-- First Name -->
    <div>
        <label class="text-sm font-medium text-gray-700">First Name</label>
        <input type="text" required
            class="w-full mt-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Middle Name -->
    <div>
        <label class="text-sm font-medium text-gray-700">Middle Name</label>
        <input type="text"
            class="w-full mt-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Last Name -->
    <div>
        <label class="text-sm font-medium text-gray-700">Last Name</label>
        <input type="text" required
            class="w-full mt-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Date of Birth -->
    <div>
        <label class="text-sm font-medium text-gray-700">Date of Birth</label>
        <input type="date" required
            class="w-full mt-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Phone -->
    <div>
        <label class="text-sm font-medium text-gray-700">Phone Number</label>
        <input type="tel" required
            class="w-full mt-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Email -->
    <div>
        <label class="text-sm font-medium text-gray-700">Email Address</label>
        <input type="email" required
            class="w-full mt-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Address -->
    <div>
        <label class="text-sm font-medium text-gray-700">Address</label>
        <textarea rows="3" required
            class="w-full mt-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
    </div>

    <!-- Password -->
    <div>
        <label class="text-sm font-medium text-gray-700">Password</label>
        <input type="password" required
            class="w-full mt-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Submit Button -->
    <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">
        Create Account
    </button>

</form>

    <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="login.html" class="text-blue-600 font-semibold hover:underline">Login</a>
    </p>
</div>

</body>
</html>
