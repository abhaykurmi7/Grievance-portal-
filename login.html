<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Civic Portal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="hero-gradient min-h-screen flex items-center justify-center px-4">

<div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-8">
    <div class="text-center mb-8">
        <div class="bg-blue-600 text-white w-14 h-14 rounded-xl flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-university text-xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Welcome Back</h1>
        <p class="text-gray-500 text-sm mt-1">Login to raise or track complaints</p>
    </div>

    <form class="space-y-5">
        <div>
            <label class="text-sm font-medium text-gray-700">Email Address</label>
            <input type="email" required
                class="w-full mt-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="text-sm font-medium text-gray-700">Password</label>
            <input type="password" required
                class="w-full mt-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2">
                <input type="checkbox" class="rounded">
                Remember me
            </label>
            <a href="#" class="text-blue-600 hover:underline">Forgot password?</a>
        </div>

        <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">
            Login
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
        Don’t have an account?
        <a href="signup.html" class="text-blue-600 font-semibold hover:underline">Sign Up</a>
    </p>
</div>

</body>
</html>
