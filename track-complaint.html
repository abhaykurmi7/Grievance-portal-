<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Complaint | Civic Portal</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Common CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-b from-blue-50 to-slate-100 text-gray-800">

  <!-- HEADER -->
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="bg-blue-600 text-white p-2 rounded">
          <i class="fas fa-university"></i>
        </div>
        <h1 class="font-bold text-lg text-blue-900 uppercase tracking-wide">
          Civic Portal
        </h1>
      </div>
      <a href="index.html" class="text-sm font-medium text-blue-600 hover:underline">
        Home
      </a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 flex items-center justify-center px-6 py-12">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

      <!-- Heading -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-blue-100 text-blue-600 mb-4">
          <i class="fas fa-magnifying-glass text-xl"></i>
        </div>

        <h2 class="text-2xl font-extrabold text-gray-900">
          Track Your Complaint
        </h2>

        <p class="text-sm text-gray-500 mt-1">
          Check real-time status of your grievance
        </p>
      </div>

      <!-- Divider -->
      <div class="w-16 h-1 bg-blue-600 mx-auto mb-6 rounded"></div>

      <!-- FORM -->
      <form class="space-y-5">

        <div>
          <label class="block text-sm font-semibold mb-1">
            Complaint ID
          </label>
          <input
            type="text"
            placeholder="CPC-2024-00123"
            class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">
            Registered Mobile / Email
          </label>
          <input
            type="text"
            placeholder="Mobile number or email"
            class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <button type="submit" class="primary-btn w-full text-base">
          <i class="fas fa-arrow-right mr-2"></i>
          Track Complaint
        </button>

      </form>

      <!-- Footer text -->
      <div class="text-center mt-6 text-sm text-gray-500">
        Don’t have a Complaint ID?
        <a href="raise-complaint.html" class="text-blue-600 font-medium hover:underline">
          Raise a Complaint
        </a>
      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <!-- paste your existing footer here -->

</body>
</html>
